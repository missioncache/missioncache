name: Deploy site

# Builds site/dist/ and publishes it to GitHub Pages (missioncache.dev).
#
# The docs and changelog pages bake in a snapshot of docs/*.md and CHANGELOG.md
# at build time, so a change to either has to be rebuilt to reach the published
# snapshot - hence the paths filter below. (The pages also live-refresh those
# same files from raw.githubusercontent.com at load time, so a stale snapshot
# self-corrects in the browser; the rebuild keeps the offline copy honest.)

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "CHANGELOG.md"
      - ".github/workflows/site.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Publish from main only. workflow_dispatch lets you pick any ref, and the
    # deploy step would push whatever it built straight to missioncache.dev, so
    # without this a dispatch from an unreviewed branch goes live. (deploy needs
    # build, so skipping build skips the deploy too.)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # markdown-it-py renders docs/*.md and CHANGELOG.md to static HTML at
      # build time. It is the only build dependency; the published site ships
      # no third-party JavaScript.
      - name: Install build dependencies
        run: pip install -r site/requirements.txt

      - name: Build site
        run: python3 site/build_site.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
