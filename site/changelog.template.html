<title>MissionCache Changelog</title>
<meta name="description" content="MissionCache release history: every change to the project layer for AI coding tools, grouped by date and concern.">
<link rel="icon" type="image/png" href="{{IMG_MARK}}">
<script>(function(){try{var t=localStorage.getItem('missioncache-theme');if(t==='light'||t==='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})()</script>

<style>
  /* ============================================================
     MissionCache changelog - releases timeline.
     Same design system as the landing + docs pages.
     ============================================================ */
  :root {
    --ground:#F1F1F8; --ground-2:#E8E8F2; --surface:#FFFFFF; --surface-2:#F8F8FC;
    --border:rgba(24,20,52,0.10); --border-2:rgba(24,20,52,0.16);
    --ink:#14131C; --ink-2:#45435A; --ink-3:#6E6C85;
    --signal:#5A56F0; --signal-2:#7A50E8;
    --grad-a:#A855F7; --grad-b:#3B82F6;
    --ok:#0E9E58; --warn:#A9690A; --err:#C4453A; --info:#1668C7; --glow:rgba(122,80,232,0.18);
    --con-bg:#0A0B12; --con-border:rgba(150,150,200,0.16); --con-ink:#E8E8F4;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground:#08090F; --ground-2:#0B0C15; --surface:#101120; --surface-2:#16172A;
      --border:rgba(150,150,205,0.13); --border-2:rgba(150,150,205,0.22);
      --ink:#E9E9F4; --ink-2:#ADACC7; --ink-3:#79788F;
      --signal:#8F8BFF; --signal-2:#A98BFF;
      --ok:#3AD48E; --warn:#F0B44E; --err:#F07A6E; --info:#6EB2FF; --glow:rgba(139,120,255,0.22);
    }
  }
  :root[data-theme="light"] {
    --ground:#F1F1F8; --ground-2:#E8E8F2; --surface:#FFFFFF; --surface-2:#F8F8FC;
    --border:rgba(24,20,52,0.10); --border-2:rgba(24,20,52,0.16);
    --ink:#14131C; --ink-2:#45435A; --ink-3:#6E6C85;
    --signal:#5A56F0; --signal-2:#7A50E8;
    --ok:#0E9E58; --warn:#A9690A; --err:#C4453A; --info:#1668C7; --glow:rgba(122,80,232,0.18);
  }
  :root[data-theme="dark"] {
    --ground:#08090F; --ground-2:#0B0C15; --surface:#101120; --surface-2:#16172A;
    --border:rgba(150,150,205,0.13); --border-2:rgba(150,150,205,0.22);
    --ink:#E9E9F4; --ink-2:#ADACC7; --ink-3:#79788F;
    --signal:#8F8BFF; --signal-2:#A98BFF;
    --ok:#3AD48E; --warn:#F0B44E; --err:#F07A6E; --info:#6EB2FF; --glow:rgba(139,120,255,0.22);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--ground); color: var(--ink);
    font-family: system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size: 16.5px; line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--signal); color: #fff; }
  code, pre { font-family: "SF Mono","JetBrains Mono","Cascadia Code",ui-monospace,Menlo,Consolas,monospace; }

  .wrap { width: 100%; max-width: 940px; margin: 0 auto; padding: 0 24px; }

  /* ---- Nav ---- */
  header.nav {
    position: sticky; top: 0; z-index: 50;
    background: var(--ground);
    background: color-mix(in srgb, var(--ground) 82%, transparent);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-in { display: flex; align-items: center; gap: 22px; height: 62px; }
  .brand { display: flex; align-items: center; gap: 10px; font-family: "SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace; font-weight: 600; font-size: 1.02rem; }
  .grad { background: linear-gradient(100deg,var(--grad-a),var(--grad-b)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .nav-links { display: flex; gap: 20px; margin-left: 12px; }
  .nav-links a { font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.83rem; color: var(--ink-2); }
  .nav-links a:hover, .nav-links a.on { color: var(--ink); }
  .nav-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .icon-btn { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 9px; border: 1px solid var(--border-2); background: var(--surface); color: var(--ink-2); cursor: pointer; }
  .icon-btn:hover { color: var(--ink); border-color: var(--signal); }
  .icon-btn:focus-visible, .btn:focus-visible { outline: 2px solid var(--signal); outline-offset: 2px; }
  .btn { font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 9px; border: 1px solid transparent; background: linear-gradient(100deg,var(--grad-a),var(--grad-b)); color: #fff; box-shadow: 0 6px 22px -8px var(--glow); }
  @media (max-width: 700px) { .nav-links { display: none; } }

  /* ---- Page head ---- */
  .page-head { padding: 52px 0 8px; }
  .eyebrow {
    font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--signal);
    display: inline-flex; align-items: center; gap: 9px;
  }
  .eyebrow::before { content: ""; width: 22px; height: 1px; background: var(--signal); opacity: .7; }
  .page-head h1 { font-family: "SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace; font-weight: 600; letter-spacing: -0.02em; font-size: clamp(1.7rem, 4vw, 2.4rem); margin: 14px 0 0; }
  .page-head .lede { color: var(--ink-2); margin: 14px 0 0; max-width: 66ch; }

  /* ---- Timeline ---- */
  .timeline { position: relative; padding: 44px 0 90px; }
  .release { position: relative; padding-left: 34px; margin-bottom: 46px; }
  .release::before { content: ""; position: absolute; left: 6px; top: 10px; bottom: -46px; width: 1px; background: var(--border-2); }
  .release:last-child::before { display: none; }
  .release::after { content: ""; position: absolute; left: 0; top: 6px; width: 13px; height: 13px; border-radius: 50%; background: linear-gradient(120deg, var(--grad-a), var(--grad-b)); box-shadow: 0 0 0 4px var(--ground); }
  .release.unreleased::after { background: var(--surface); border: 2px solid var(--signal); }

  .r-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; }
  .r-date { margin: 0; font-family: "SF Mono","JetBrains Mono",ui-monospace,Menlo,monospace; font-weight: 600; font-size: 1.25rem; letter-spacing: -0.01em; }
  .r-badge { font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--signal); border: 1px solid var(--signal); border-radius: 999px; padding: 3px 10px; }
  .r-versions { font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.76rem; color: var(--ink-3); margin-top: 8px; line-height: 1.8; }

  /* category group: the label lives here, not on every row */
  .cat-group { margin-top: 26px; }
  .cat-label {
    margin: 0; font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .cat-label::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .cat-added    { color: var(--ok); }
  .cat-changed  { color: var(--info); }
  .cat-fixed    { color: var(--warn); }
  .cat-security { color: var(--err); }
  .cat-removed, .cat-deprecated, .cat-other { color: var(--ink-3); }

  /* entry: one scannable line, details on demand */
  .entry { border-bottom: 1px solid var(--border); }
  .cat-group .entry:first-of-type { border-top: 1px solid var(--border); margin-top: 10px; }
  .entry > summary {
    list-style: none; cursor: pointer; display: flex; align-items: baseline; gap: 12px;
    padding: 11px 2px; color: var(--ink);
  }
  .entry > summary::-webkit-details-marker { display: none; }
  .entry > summary:hover { color: var(--signal); }
  .entry > summary:focus-visible { outline: 2px solid var(--signal); outline-offset: -2px; border-radius: 6px; }
  .e-chev { flex: none; width: 9px; color: var(--ink-3); font-size: 0.7rem; transition: transform .15s ease; }
  .entry[open] > summary .e-chev { transform: rotate(90deg); }
  .e-title { font-size: 0.94rem; line-height: 1.45; }
  .e-title code { font-size: 0.86em; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; overflow-wrap: anywhere; }
  .e-pkg { font-family: "SF Mono",ui-monospace,Menlo,monospace; font-size: 0.7rem; color: var(--ink-3); margin-left: auto; flex: none; padding-left: 12px; }
  @media (max-width: 620px) { .e-pkg { display: none; } }
  .e-body { padding: 2px 0 16px 21px; }
  .e-body p, .e-body li { color: var(--ink-2); font-size: 0.9rem; margin: 5px 0; }
  .e-body ul { padding-left: 20px; margin: 0; }
  .e-body code { font-size: 0.85em; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; padding: 1.5px 6px; color: var(--ink); overflow-wrap: anywhere; }
  .e-body a { color: var(--signal); }
  .e-body strong { color: var(--ink); }

  .skip { position: absolute; left: -9999px; top: 0; background: var(--signal); color: #fff; padding: 10px 16px; border-radius: 0 0 8px 0; z-index: 100; }
  .skip:focus { left: 0; }

  footer { border-top: 1px solid var(--border); padding: 34px 0 46px; color: var(--ink-3); font-size: 0.8rem; }
  .foot-in { display: flex; flex-wrap: wrap; gap: 18px; justify-content: space-between; align-items: center; }
  .foot-in .links { display: flex; gap: 18px; }
  .foot-in .links a { font-family: "SF Mono",ui-monospace,Menlo,monospace; color: var(--ink-2); }
  .foot-in .links a:hover { color: var(--ink); }
</style>

<a class="skip" href="#timeline">Skip to content</a>

<header class="nav">
  <div class="wrap nav-in">
    <a class="brand" href="{{HOME_URL}}" aria-label="MissionCache home">
      <img src="{{IMG_MARK}}" width="26" height="26" alt="">
      <span>Mission<span class="grad">Cache</span></span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="{{DOCS_URL}}">Docs</a>
      <a href="{{HOME_URL}}changelog/" class="on" aria-current="page">Changelog</a>
      <a href="https://github.com/missioncache/missioncache" target="_blank" rel="noopener">GitHub</a>
    </nav>
    <div class="nav-right">
      <button class="icon-btn" id="theme" aria-label="Toggle light and dark theme" title="Toggle theme">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg>
      </button>
      <a class="btn" href="{{HOME_URL}}#install">Install</a>
    </div>
  </div>
</header>

<div class="wrap page-head">
  <span class="eyebrow">Changelog</span>
  <h1>Every change, dated and grouped.</h1>
  <p class="lede">Newest first. Click any entry to read the detail.</p>
</div>

<main class="wrap timeline" id="timeline">
{{TIMELINE}}
</main>

<footer>
  <div class="wrap foot-in">
    <span>MissionCache &middot; MIT licensed &middot; missioncache.dev</span>
    <span class="links">
      <a href="{{HOME_URL}}">Home</a>
      <a href="{{DOCS_URL}}">Docs</a>
      <a href="https://github.com/missioncache/missioncache/blob/main/CHANGELOG.md" target="_blank" rel="noopener">Raw CHANGELOG.md</a>
    </span>
  </div>
</footer>

<script>
  (function () {
    'use strict';
    var root = document.documentElement;
    var btn = document.getElementById('theme');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var cur = root.getAttribute('data-theme');
      if (!cur) { try { cur = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; } catch (e) { cur = 'dark'; } }
      var next = cur === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('missioncache-theme', next); } catch (e) {}
    });
  })();
</script>
